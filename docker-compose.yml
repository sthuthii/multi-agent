version: "3.9"

services:
  app:
    build: .
    container_name: multi_agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs          # persist trace logs
      - ./evals:/app/evals        # persist eval results
      - ./.chroma:/app/.chroma    # persist ChromaDB memory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s